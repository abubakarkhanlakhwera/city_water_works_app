name: city_water_works_app
description: "Water Supply — Machinery Billing & Record Management App"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Database
  sqflite: ^2.4.2
  sqflite_common_ffi: ^2.3.6
  path_provider: ^2.1.5
  path: ^1.9.1

  # State management
  provider: ^6.1.2

  # File operations
  file_picker: ^8.1.7
  share_plus: ^10.1.4

  # Excel import/export
  excel: ^4.0.6

  # PDF
  pdf: ^3.11.2
  printing: ^5.13.4

  # UI
  google_fonts: ^6.2.1
  fl_chart: ^0.70.2

  # Utilities
  intl: ^0.20.2
  uuid: ^4.5.1
  url_launcher: ^6.3.1
  archive: ^3.6.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.4

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/branding/app_brand.png
  min_sdk_android: 21
  web:
    generate: true
    image_path: assets/branding/app_brand.png
    background_color: "#0B1E3A"
    theme_color: "#0B1E3A"
  windows:
    generate: true
    image_path: assets/branding/app_brand.png
    icon_size: 256
  macos:
    generate: true
    image_path: assets/branding/app_brand.png

flutter_native_splash:
  color: "#0B1E3A"
  image: assets/branding/app_brand.png
  android: true
  ios: true
  web: true
  android_12:
    color: "#0B1E3A"
    image: assets/branding/app_brand.png

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/branding/app_brand.png
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/to/font-from-package
